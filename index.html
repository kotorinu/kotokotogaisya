<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ことこと株式会社</title>
<link rel="icon" href="data:," />
<style>
:root{
  --bg:        oklch(0.985 0.004 95);
  --paper:     #ffffff;
  --ink:       oklch(0.255 0.012 60);
  --ink-soft:  oklch(0.46 0.012 60);
  --ink-faint: oklch(0.62 0.010 60);
  --line:      oklch(0.905 0.006 80);
  --line-soft: oklch(0.945 0.005 85);
  --accent:    oklch(0.40 0.058 255);
  --accent-ink:oklch(0.34 0.060 255);
  --accent-wash: oklch(0.96 0.012 255);
  --shadow: 0 1px 2px rgba(30,28,24,.04), 0 12px 30px -18px rgba(30,28,24,.22);
  --shadow-lg: 0 2px 6px rgba(30,28,24,.05), 0 30px 60px -30px rgba(30,28,24,.30);
  --display: "Yu Mincho", "Hiragino Mincho ProN", "Noto Serif JP", serif;
  --sans: "Yu Gothic", "Meiryo", "Noto Sans JP", system-ui, sans-serif;
  --maxw: 1180px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--ink);
  line-height:1.75;
  font-size:16px;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
a{color:inherit;text-decoration:none;}
img{display:block;max-width:100%;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

/* ---------- type ---------- */
.serif{font-family:var(--display);}
.eyebrow{
  font-size:11px;letter-spacing:.34em;font-weight:700;
  color:var(--accent-ink);text-transform:uppercase;
  display:flex;align-items:center;gap:.7em;
}
.eyebrow .ja{letter-spacing:.18em;color:var(--ink-soft);font-weight:500;font-size:12px;}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--accent);display:inline-block;}

h1,h2,h3{font-family:var(--display);font-weight:600;line-height:1.32;letter-spacing:.01em;}
.nowrap{white-space:nowrap;}
.measure{max-width:62ch;}

/* ---------- layout ---------- */
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 32px;}
.section{padding:var(--sec-pad,104px) 0;}
.section--tight{padding:72px 0;}
.center{text-align:center;}
.divider{height:1px;background:var(--line-soft);border:0;}

/* ---------- buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:.6em;
  padding:14px 26px;font-size:14px;font-weight:700;letter-spacing:.04em;
  border-radius:2px;transition:.22s ease;white-space:nowrap;
}
.btn .arw{transition:transform .22s ease;}
.btn:hover .arw{transform:translateX(4px);}
.btn--solid{background:var(--accent);color:#fff;}
.btn--solid:hover{background:var(--accent-ink);}
.btn--ghost{border:1px solid var(--line);color:var(--ink);background:var(--paper);}
.btn--ghost:hover{border-color:var(--accent);color:var(--accent-ink);}
.btn--line{padding:8px 0;border-bottom:1px solid currentColor;border-radius:0;color:var(--accent-ink);}

/* ---------- header ---------- */
.topbar{background:var(--ink);color:#fff;font-size:12px;letter-spacing:.06em;}
.topbar .wrap{display:flex;justify-content:space-between;align-items:center;height:38px;}
.topbar .muted{color:rgba(255,255,255,.62);}
.topbar b{font-weight:500;letter-spacing:.04em;}

header.site{position:sticky;top:0;z-index:50;background:rgba(251,250,248,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line-soft);}
header.site .wrap{display:flex;align-items:center;justify-content:space-between;height:74px;}
.brand{display:flex;align-items:center;gap:13px;cursor:pointer;}
.brand .mark{width:38px;height:38px;border:1px solid var(--ink);display:grid;place-items:center;font-family:var(--display);font-size:20px;color:var(--ink);}
.brand .mark span{display:block;transform:translateY(-1px);}
.brand .name{font-family:var(--display);font-size:19px;font-weight:600;letter-spacing:.06em;}
.brand .en{font-size:9.5px;letter-spacing:.32em;color:var(--ink-faint);text-transform:uppercase;margin-top:2px;}
nav.main{display:flex;align-items:center;gap:34px;}
nav.main a{font-size:13.5px;font-weight:500;letter-spacing:.05em;position:relative;padding:6px 0;color:var(--ink-soft);transition:color .2s;}
nav.main a .en{display:block;font-size:9px;letter-spacing:.2em;color:var(--ink-faint);margin-top:1px;text-transform:uppercase;}
nav.main a:hover,nav.main a.active{color:var(--ink);}
nav.main a.active::after{content:"";position:absolute;left:0;bottom:-2px;width:100%;height:2px;background:var(--accent);}
.nav-cta{display:flex;align-items:center;gap:18px;}
.menu-btn{display:none;}
.drawer-backdrop{position:fixed;inset:0;background:rgba(25,24,22,.38);z-index:80;opacity:0;pointer-events:none;transition:opacity .2s;}
.drawer-backdrop.open{opacity:1;pointer-events:auto;}
.mobile-drawer{position:fixed;top:0;right:0;bottom:0;width:min(84vw,340px);background:var(--paper);z-index:90;transform:translateX(100%);transition:transform .24s ease;box-shadow:-20px 0 50px rgba(20,18,16,.16);padding:24px;display:flex;flex-direction:column;}
.mobile-drawer.open{transform:translateX(0);}
.drawer-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding-bottom:20px;border-bottom:1px solid var(--line);}
.drawer-head .name{font-family:var(--display);font-size:18px;letter-spacing:.06em;}
.drawer-head .en{font-size:9px;letter-spacing:.28em;color:var(--ink-faint);margin-top:3px;}
.drawer-head button{width:38px;height:38px;border:1px solid var(--line);font-size:22px;line-height:1;background:var(--paper);}
.mobile-drawer nav{display:grid;gap:0;margin-top:18px;}
.mobile-drawer nav a{display:flex;justify-content:space-between;align-items:baseline;padding:18px 0;border-bottom:1px solid var(--line-soft);font-size:16px;font-weight:700;}
.mobile-drawer nav a small{font-size:10px;letter-spacing:.18em;color:var(--ink-faint);font-weight:700;}
.mobile-drawer nav a.active{color:var(--accent-ink);}
.drawer-info{margin-top:auto;border-top:1px solid var(--line);padding-top:18px;display:grid;gap:5px;font-size:13px;color:var(--ink-soft);}
.drawer-info b{font-size:18px;color:var(--accent-ink);font-family:var(--display);}

/* ---------- hero ---------- */
.hero{position:relative;overflow:hidden;border-bottom:1px solid var(--line-soft);}
.hero .wrap{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center;padding-top:84px;padding-bottom:84px;}
.hero h1{font-size:clamp(34px,4.4vw,60px);line-height:1.28;font-weight:600;letter-spacing:.02em;}
.hero h1 .em{color:var(--accent-ink);}
.hero-sp{display:none;}
.hero .lead{margin-top:30px;color:var(--ink-soft);font-size:16px;max-width:42ch;}
.hero .cta-row{margin-top:40px;display:flex;gap:16px;flex-wrap:wrap;}
.hero .stats{margin-top:48px;display:flex;gap:40px;}
.hero .stats .n{font-family:var(--display);font-size:30px;font-weight:600;}
.hero .stats .l{font-size:11px;letter-spacing:.14em;color:var(--ink-faint);margin-top:2px;}
.hero-visual{position:relative;aspect-ratio:4/5;}

/* placeholder image */
.ph{
  position:relative;overflow:hidden;background:
    repeating-linear-gradient(135deg, oklch(0.93 0.006 80) 0 11px, oklch(0.955 0.005 85) 11px 22px);
  border:1px solid var(--line);display:grid;place-items:center;color:var(--ink-faint);
}
.ph .tag{font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.08em;background:var(--paper);border:1px solid var(--line);padding:5px 11px;color:var(--ink-soft);}
.ph--dark{background:repeating-linear-gradient(135deg, oklch(0.30 0.01 60) 0 11px, oklch(0.34 0.01 60) 11px 22px);color:rgba(255,255,255,.7);}
.ph--dark .tag{background:rgba(20,18,16,.6);border-color:rgba(255,255,255,.18);color:rgba(255,255,255,.85);}
.ph--image{background:var(--paper);display:block;}
.ph--image img{width:100%;height:100%;object-fit:cover;}
.ph--empty{background:linear-gradient(135deg, oklch(0.94 0.005 85), oklch(0.985 0.004 95));}
.ph--empty .tag{font-family:var(--sans);font-size:12px;letter-spacing:.08em;}

/* ---------- two-business cards ---------- */
.biz-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
.biz{
  position:relative;background:var(--paper);border:1px solid var(--line);
  padding:0;overflow:hidden;cursor:pointer;transition:.28s ease;display:flex;flex-direction:column;
}
.biz:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:transparent;}
.biz .pic{aspect-ratio:16/10;}
.biz .body{padding:30px 32px 34px;flex:1;display:flex;flex-direction:column;}
.biz .no{font-family:var(--display);font-size:13px;color:var(--accent-ink);letter-spacing:.1em;}
.biz h3{font-size:25px;margin-top:12px;}
.biz .sub{font-size:13px;color:var(--ink-faint);letter-spacing:.06em;margin-top:4px;}
.biz p{margin-top:16px;color:var(--ink-soft);font-size:14.5px;flex:1;}
.biz .go{margin-top:24px;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;letter-spacing:.05em;color:var(--accent-ink);}
.biz .go .arw{transition:transform .24s;}
.biz:hover .go .arw{transform:translateX(5px);}

/* ---------- section heading block ---------- */
.shead{display:flex;justify-content:space-between;align-items:flex-end;gap:30px;margin-bottom:48px;flex-wrap:wrap;}
.shead h2{font-size:clamp(26px,3vw,38px);}
.shead .lead{color:var(--ink-soft);font-size:14.5px;margin-top:14px;max-width:46ch;}

/* ---------- value / stance ---------- */
.values{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);background:var(--paper);}
.value{padding:42px 34px;border-right:1px solid var(--line);}
.value:last-child{border-right:0;}
.value .ic{width:34px;height:34px;color:var(--accent);}
.value h3{font-size:20px;margin-top:20px;}
.value p{margin-top:12px;color:var(--ink-soft);font-size:14px;}

/* ---------- car grid ---------- */
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:30px;}
.chips{display:flex;gap:9px;flex-wrap:wrap;}
.chip{padding:8px 16px;font-size:13px;font-weight:500;border:1px solid var(--line);background:var(--paper);border-radius:999px;color:var(--ink-soft);transition:.18s;letter-spacing:.02em;}
.chip:hover{border-color:var(--accent);color:var(--accent-ink);}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.select{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink-soft);}
.select select{font-family:inherit;font-size:13px;padding:8px 30px 8px 13px;border:1px solid var(--line);background:var(--paper);border-radius:2px;color:var(--ink);appearance:none;cursor:pointer;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%23888' stroke-width='1.3'/></svg>");background-repeat:no-repeat;background-position:right 11px center;}

.cars{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
.car{background:var(--paper);border:1px solid var(--line);overflow:hidden;cursor:pointer;transition:.24s ease;display:flex;flex-direction:column;}
.car:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:transparent;}
.car .pic{aspect-ratio:4/3;position:relative;}
.car .pic .badge{position:absolute;top:12px;left:12px;background:var(--ink);color:#fff;font-size:10.5px;letter-spacing:.08em;padding:4px 9px;font-weight:500;}
.car .pic .heart{position:absolute;top:10px;right:10px;width:30px;height:30px;background:rgba(255,255,255,.92);border-radius:999px;display:grid;place-items:center;color:var(--ink-faint);}
.car .info{padding:18px 20px 20px;display:flex;flex-direction:column;flex:1;}
.car .mk{font-size:11.5px;letter-spacing:.1em;color:var(--ink-faint);font-weight:500;}
.car h3{font-size:18px;margin-top:5px;font-weight:600;}
.car .grade{font-size:12px;color:var(--ink-faint);margin-top:2px;font-weight:400;font-family:var(--sans);}
.car .specrow{display:flex;gap:14px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line-soft);font-size:11.5px;color:var(--ink-soft);}
.car .specrow div span{display:block;color:var(--ink-faint);font-size:10px;letter-spacing:.06em;margin-bottom:2px;}
.car .price{margin-top:auto;padding-top:16px;display:flex;align-items:baseline;justify-content:space-between;}
.car .price .yen{font-family:var(--display);font-size:13px;color:var(--ink-soft);}
.car .price .n{font-family:var(--display);font-size:27px;font-weight:600;color:var(--ink);letter-spacing:.01em;}
.car .price .n .u{font-size:14px;margin-left:1px;}
.car .price .view{font-size:12px;font-weight:700;color:var(--accent-ink);letter-spacing:.04em;}

.feed-note{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--ink-faint);margin-top:26px;letter-spacing:.02em;}
.feed-note .dot{width:7px;height:7px;border-radius:999px;background:oklch(0.66 0.13 150);box-shadow:0 0 0 3px oklch(0.66 0.13 150 / .18);}

/* ---------- car detail ---------- */
.crumb{font-size:12px;color:var(--ink-faint);letter-spacing:.04em;margin-bottom:26px;display:flex;gap:8px;align-items:center;}
.crumb a:hover{color:var(--accent-ink);}
.detail{display:grid;grid-template-columns:1.15fr .85fr;gap:48px;align-items:start;}
.gallery .main{aspect-ratio:4/3;}
.gallery .thumbs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px;}
.gallery .thumbs .ph{aspect-ratio:4/3;cursor:pointer;}
.gallery .thumbs .ph.on{outline:2px solid var(--accent);outline-offset:-2px;}
.dpanel .mk{font-size:12px;letter-spacing:.12em;color:var(--accent-ink);font-weight:700;}
.dpanel h1{font-size:30px;margin-top:8px;line-height:1.3;}
.dpanel .grade{font-size:14px;color:var(--ink-soft);margin-top:4px;}
.dpanel .tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:16px;}
.dpanel .tags span{font-size:11px;border:1px solid var(--line);padding:4px 11px;border-radius:999px;color:var(--ink-soft);letter-spacing:.04em;}
.priceblock{margin:24px 0;padding:22px 24px;background:var(--accent-wash);border:1px solid var(--line);display:flex;align-items:baseline;justify-content:space-between;}
.priceblock .lab{font-size:12px;color:var(--ink-soft);letter-spacing:.08em;}
.priceblock .n{font-family:var(--display);font-size:40px;font-weight:600;color:var(--accent-ink);}
.priceblock .n .u{font-size:18px;}
.spectable{width:100%;border-collapse:collapse;font-size:13.5px;}
.spectable th,.spectable td{text-align:left;padding:13px 4px;border-bottom:1px solid var(--line-soft);vertical-align:top;}
.spectable th{width:34%;color:var(--ink-faint);font-weight:500;letter-spacing:.04em;}
.spectable td{color:var(--ink);}
.equip{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;}
.equip span{font-size:12px;background:var(--bg);border:1px solid var(--line-soft);padding:7px 12px;color:var(--ink-soft);}
.dcta{display:flex;gap:12px;margin-top:26px;}

/* ---------- DX services ---------- */
.svc-list{border-top:1px solid var(--line);}
.svc{display:grid;grid-template-columns:auto 1fr auto;gap:40px;align-items:start;padding:38px 8px;border-bottom:1px solid var(--line);transition:.2s;}
.svc:hover{background:var(--paper);padding-left:24px;padding-right:24px;}
.svc .no{font-family:var(--display);font-size:15px;color:var(--accent-ink);letter-spacing:.1em;padding-top:6px;}
.svc .en{font-size:10px;letter-spacing:.24em;color:var(--ink-faint);font-weight:700;}
.svc h3{font-size:23px;margin-top:8px;}
.svc .lead{font-size:14px;color:var(--ink);margin-top:10px;font-weight:500;}
.svc p{font-size:13.5px;color:var(--ink-soft);margin-top:8px;max-width:54ch;}
.svc .pts{display:flex;flex-direction:column;gap:8px;min-width:200px;padding-top:6px;}
.svc .pts span{font-size:12.5px;color:var(--ink-soft);display:flex;gap:9px;align-items:flex-start;}
.svc .pts span::before{content:"";width:5px;height:5px;background:var(--accent);border-radius:999px;margin-top:8px;flex-shrink:0;}

.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:0;counter-reset:s;}
.step{padding:0 26px;border-left:1px solid var(--line);}
.step:first-child{padding-left:0;border-left:0;}
.step .no{font-family:var(--display);font-size:14px;color:var(--accent-ink);letter-spacing:.12em;}
.step .bar{height:2px;background:var(--line);margin:14px 0 18px;position:relative;}
.step .bar::before{content:"";position:absolute;left:0;top:0;height:100%;width:26px;background:var(--accent);}
.step h3{font-size:17px;}
.step p{font-size:13px;color:var(--ink-soft);margin-top:10px;}

.works{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
.work{background:var(--paper);border:1px solid var(--line);overflow:hidden;}
.work .pic{aspect-ratio:16/10;}
.work .b{padding:22px 24px 26px;}
.work .tag{font-size:11px;letter-spacing:.08em;color:var(--accent-ink);font-weight:700;}
.work h3{font-size:18px;margin-top:10px;}
.work p{font-size:13px;color:var(--ink-soft);margin-top:8px;}

/* ---------- cta band ---------- */
.band{background:var(--ink);color:#fff;}
.band .wrap{padding:84px 32px;display:grid;grid-template-columns:1fr auto;gap:40px;align-items:center;}
.band .eyebrow{color:rgba(255,255,255,.62);}
.band .eyebrow::before{background:rgba(255,255,255,.5);}
.band .eyebrow .ja{color:rgba(255,255,255,.62);}
.band h2{font-size:clamp(26px,3vw,40px);color:#fff;}
.band p{color:rgba(255,255,255,.66);margin-top:16px;font-size:14.5px;}
.band .btn--solid{background:#fff;color:var(--ink);}
.band .btn--solid:hover{background:rgba(255,255,255,.86);}
.band .btn--ghost{background:transparent;border-color:rgba(255,255,255,.3);color:#fff;}
.band .btn--ghost:hover{border-color:#fff;}
.dx-preview .wrap{grid-template-columns:minmax(0,.95fr) minmax(420px,1.15fr);align-items:start;}
.dx-preview-copy{grid-column:1/-1;min-width:0;}
.dx-preview-copy h2{white-space:nowrap;}
.dx-preview-lead{color:rgba(255,255,255,.72);font-size:15px;margin:0;max-width:620px;}
.dx-preview-services{display:flex;flex-wrap:wrap;gap:12px;margin-top:0;align-content:center;}
.dx-preview-action{grid-column:1/-1;margin-top:8px;}

/* ---------- company ---------- */
.cprofile{width:100%;border-collapse:collapse;font-size:14px;}
.cprofile th,.cprofile td{text-align:left;padding:18px 6px;border-bottom:1px solid var(--line);vertical-align:top;}
.cprofile th{width:26%;color:var(--ink-soft);font-weight:500;letter-spacing:.06em;font-family:var(--display);}
.access{aspect-ratio:16/9;}

/* ---------- contact ---------- */
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:20px 26px;}
.field{display:flex;flex-direction:column;gap:8px;}
.field.full{grid-column:1/-1;}
.field label{font-size:12.5px;font-weight:700;letter-spacing:.04em;color:var(--ink);display:flex;gap:8px;align-items:center;}
.field label .req{font-size:10px;background:var(--accent);color:#fff;padding:2px 7px;letter-spacing:.06em;border-radius:2px;}
.field input,.field textarea,.field select{font-family:inherit;font-size:14px;padding:13px 15px;border:1px solid var(--line);background:var(--paper);border-radius:2px;color:var(--ink);transition:.18s;}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-wash);}
.field textarea{resize:vertical;min-height:130px;}

/* ---------- footer ---------- */
footer.site{background:var(--bg);border-top:1px solid var(--line);padding:64px 0 30px;}
footer.site .top{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:40px;}
footer .fbrand .name{font-family:var(--display);font-size:20px;letter-spacing:.06em;}
footer .fbrand p{font-size:12.5px;color:var(--ink-soft);margin-top:14px;max-width:30ch;line-height:1.85;}
footer .fcol h4{font-size:11px;letter-spacing:.16em;color:var(--ink-faint);text-transform:uppercase;margin-bottom:16px;font-weight:700;}
footer .fcol a{display:block;font-size:13px;color:var(--ink-soft);padding:5px 0;transition:.18s;}
footer .fcol a:hover{color:var(--accent-ink);}
footer .legal{margin-top:48px;padding-top:24px;border-top:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--ink-faint);letter-spacing:.04em;flex-wrap:wrap;gap:12px;}

.fade{animation:fade .5s ease both;}
@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* ---------- responsive ---------- */
@media(max-width:920px){
  .hero .wrap{grid-template-columns:1fr;gap:36px;}
  .hero-visual{aspect-ratio:16/11;}
  .biz-grid,.cars,.works,.steps,.values{grid-template-columns:1fr;}
  .value{border-right:0;border-bottom:1px solid var(--line);}
