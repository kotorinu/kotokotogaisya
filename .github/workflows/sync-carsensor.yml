name: カーセンサー在庫同期

# 1日1回（JST 朝9時頃 = UTC 0:00）＋手動実行
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "保存せず差分だけ確認（true/false）"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: carsensor-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 依存インストール
        run: npm install --no-audit --no-fund

      - name: 同期実行
        env:
          CARSENSOR_SHOP_URL: ${{ vars.CARSENSOR_SHOP_URL }}
          MAX_CARS: "20"
          NEW_DAYS: "14"
          # CGI(旧とくとくBB方式)は使わず、公開ページ取得だけで data/cars.json を生成。
          # CGI系の環境変数を渡さない → スクリプトは自動でローカル書き出しモードになる。
          # 反映は後段の「コミット」と「FTPアップロード」で行う（画像はカーセンサー直リンク）。
          WRITE_LOCAL: "1"
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
        run: npm run sync

      - name: cars.json の変更をコミット（バックアップ）
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "carsensor-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- data/cars.json; then
            git add data/cars.json
            git commit -m "chore: カーセンサー在庫を同期 ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "変更なし"
          fi

      - name: とくとくBB(公式ドメイン)へ cars.json をFTPアップロード
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          BB_FTP_HOST: ${{ secrets.BB_FTP_HOST }}
          BB_FTP_USER: ${{ secrets.BB_FTP_USER }}
          BB_FTP_PASS: ${{ secrets.BB_FTP_PASS }}
        run: |
          if [ -n "$BB_FTP_HOST" ] && [ -n "$BB_FTP_USER" ] && [ -n "$BB_FTP_PASS" ]; then
            curl -sS --fail --user "$BB_FTP_USER:$BB_FTP_PASS" -T data/cars.json "ftp://$BB_FTP_HOST/data/cars.json"
            echo "とくとくBBへ cars.json をアップロードしました"
          else
            echo "BB FTP secrets 未設定のためスキップ（BB_FTP_HOST/USER/PASS）"
          fi
